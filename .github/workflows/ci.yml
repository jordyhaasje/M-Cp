name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Documentation checks
        run: npm run check:docs

      - name: Repository hygiene checks
        run: npm run check:repo

      - name: Verify shared package mirrors
        run: npm run verify:shared

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run -ws --if-present test

      - name: E2E contract test
        run: npm run test:e2e
